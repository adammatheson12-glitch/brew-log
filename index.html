<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>ΔV-60</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #070d13;
      --bg2:       #0b1520;
      --bg3:       #101c2a;
      --bg4:       #162334;
      --border:    #1b2e40;
      --accent:    #18d9b4;
      --accent-lo: rgba(24,217,180,.1);
      --accent-hi: rgba(24,217,180,.22);
      --text:      #dff0ec;
      --text-mid:  #5a9990;
      --text-dim:  #2b5550;
      --amber:     #e8a444;
      --amber-lo:  rgba(232,164,68,.12);
      --red:       #e05555;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;min-height:100vh;overscroll-behavior:none}
    #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

    /* ── SCROLLBAR ─────────────────────────────── */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .drum-track{scrollbar-width:none;-ms-overflow-style:none}
    .drum-track::-webkit-scrollbar{display:none}

    /* ── HEADER ────────────────────────────────── */
    .page-header{padding:22px 18px 14px}
    .logo-eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
    .logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.01em;color:var(--text);line-height:1}
    .logo em{color:var(--accent);font-style:normal}
    .logo-num{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700}

    /* ── TABS ──────────────────────────────────── */
    .tabs{display:flex;gap:24px;padding:16px 18px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
    .tab{background:none;border:none;border-bottom:2px solid transparent;padding-bottom:11px;margin-bottom:-1px;
         font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
         color:var(--text-dim);cursor:pointer;transition:color .15s}
    .tab.on{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── CARDS ─────────────────────────────────── */
    .list{padding:0 14px;display:flex;flex-direction:column;gap:9px;padding-bottom:88px}
    .card{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--accent);
          border-radius:2px;padding:14px 15px;cursor:pointer;transition:border-color .15s,background .12s}
    .card:active{background:var(--bg3)}
    .card.finished{border-left-color:var(--border);opacity:.7}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .card-roaster{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px}
    .card-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:600;line-height:1.15;color:var(--text)}
    .roast-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;
               background:var(--bg3);border:1px solid var(--border);border-radius:2px;
               white-space:nowrap;flex-shrink:0;margin-top:2px}
    .card-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:9px}
    .chip{font-size:11px;color:var(--text-mid)}
    .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .last-brewed{font-size:10px;color:var(--text-dim)}
    .next-pill{font-size:10px;color:var(--amber);background:var(--amber-lo);
               padding:3px 8px;border-radius:2px;max-width:180px;
               overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── ADD FAB ───────────────────────────────── */
    #add-fab{position:fixed;bottom:22px;right:max(18px,calc(50vw - 222px));
             width:50px;height:50px;background:var(--accent);border:none;border-radius:50%;
             color:var(--bg);font-size:26px;cursor:pointer;display:flex;
             align-items:center;justify-content:center;
             box-shadow:0 4px 22px rgba(24,217,180,.4);transition:transform .12s;font-family:monospace}
    #add-fab:active{transform:scale(.9)}

    /* ── EMPTY ─────────────────────────────────── */
    .empty{padding:64px 20px;text-align:center}
    .empty-icon{font-size:32px;opacity:.25;margin-bottom:14px}
    .empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;color:var(--text-mid);margin-bottom:6px}
    .empty-sub{font-size:11px;color:var(--text-dim)}

    /* ── STARS / PIPS ──────────────────────────── */
    .stars{display:flex;gap:3px}
    .star-on{color:var(--accent);font-size:14px}
    .star-off{color:var(--border);font-size:14px}
    .pips{display:flex;gap:5px;align-items:center;margin-top:5px}
    .pip{width:20px;height:3px;border-radius:2px;background:var(--border)}
    .pip.on{background:var(--accent)}

    /* ── DETAIL ────────────────────────────────── */
    .detail{min-height:100vh;padding-bottom:32px}
    .detail-header{padding:18px 16px;display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--border)}
    .back{background:none;border:none;color:var(--text-mid);font-size:18px;cursor:pointer;padding:3px 0 0;flex-shrink:0}
    .detail-name{font-family:'Syne',sans-serif;font-size:25px;font-weight:700;line-height:1.15}
    .detail-sub{font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.7}

    /* ── NEXT-TIME BANNER ──────────────────────── */
    .nt-banner{margin:14px 14px 0;background:var(--amber-lo);border:1px solid rgba(232,164,68,.3);
               border-radius:2px;padding:11px 13px}
    .nt-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
    .nt-values{display:flex;gap:16px;flex-wrap:wrap}
    .nt-val{font-size:12px;color:var(--text)}
    .nt-val span{color:var(--text-mid);font-size:10px;margin-left:3px}

    /* ── SECTION ───────────────────────────────── */
    .section{padding:18px 14px 0}
    .sec-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:11px}

    /* ── SETTINGS ROW ──────────────────────────── */
    .settings-row{display:flex;gap:8px}
    .setting-block{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:2px;
                   padding:10px 8px 8px;text-align:center;cursor:pointer;transition:border-color .15s}
    .setting-block:active{border-color:var(--accent)}
    .setting-block.no-tap{cursor:default}
    .setting-block.no-tap:active{border-color:var(--border)}
    .sb-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
    .sb-val{font-size:20px;font-weight:500;color:var(--text);line-height:1}
    .sb-unit{font-size:10px;color:var(--text-dim);margin-top:2px}
    /* Dose is directly editable */
    .dose-input{width:100%;background:none;border:none;color:var(--text);font-family:'IBM Plex Mono',monospace;
                font-size:20px;font-weight:500;text-align:center;outline:none;padding:0;
                -moz-appearance:textfield}
    .dose-input::-webkit-outer-spin-button,.dose-input::-webkit-inner-spin-button{-webkit-appearance:none}
    .dose-input:focus{color:var(--accent)}
    .dose-input::placeholder{color:var(--border)}
    .water-calc{font-size:11px;color:var(--text-mid);text-align:center;margin-top:8px}
    .water-calc strong{color:var(--text)}

    /* ── ROASTER NOTES ─────────────────────────── */
    .rn-text{font-size:14px;color:var(--text-mid);line-height:1.65;font-style:italic}

    /* ── COMMENTS ──────────────────────────────── */
    .comment-box{font-size:12px;color:var(--text-mid);line-height:1.6;
                 padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:2px}

    /* ── ACTIONS ───────────────────────────────── */
    .actions{padding:18px 14px 0;display:flex;flex-direction:column;gap:8px}
    .btn{width:100%;padding:13px;border-radius:2px;border:none;
         font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
         text-transform:uppercase;cursor:pointer;transition:opacity .12s}
    .btn:active{opacity:.65}
    .btn-primary{background:var(--accent);color:var(--bg);font-weight:500}
    .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
    .btn-danger{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
    .btn-sm{padding:8px 12px;font-size:10px;width:auto}

    /* ── OVERLAY / MODAL ───────────────────────── */
    .overlay{position:fixed;inset:0;background:rgba(5,9,14,.9);
             display:flex;align-items:flex-end;justify-content:center;
             z-index:200;animation:fadeIn .18s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--bg2);border:1px solid var(--border);border-bottom:none;
           border-radius:6px 6px 0 0;width:100%;max-width:480px;
           padding:22px 16px 38px;max-height:92vh;overflow-y:auto;
           animation:slideUp .22s cubic-bezier(.22,1,.36,1)}
    @keyframes slideUp{from{transform:translateY(40px);opacity:.3}to{transform:translateY(0);opacity:1}}
    .modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:3px}
    .modal-sub{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:20px}

    /* ── FORM ──────────────────────────────────── */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
    .fi,.fs,.ft{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:2px;
                color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;
                padding:9px 11px;outline:none;transition:border-color .18s;-webkit-appearance:none}
    .fi:focus,.fs:focus,.ft:focus{border-color:var(--accent)}
    .fi::placeholder,.ft::placeholder{color:var(--text-dim)}
    .fs option{background:var(--bg3)}
    .ft{resize:vertical;min-height:72px;line-height:1.5}
    .fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

    /* ── STAR INPUT ────────────────────────────── */
    .star-inp{display:flex;gap:7px}
    .star-btn{background:none;border:none;font-size:22px;cursor:pointer;
              color:var(--border);transition:color .1s,transform .1s;padding:0;line-height:1}
    .star-btn.on{color:var(--accent)}
    .star-btn:active{transform:scale(1.3)}
    .pip-btn{background:none;border:none;cursor:pointer;padding:6px 4px}
    .pip-btn .pip{transition:background .1s}

    /* ── MODAL ACTIONS ─────────────────────────── */
    .m-actions{display:flex;gap:8px;margin-top:16px}
    .m-actions .btn{flex:1}
    .m-actions .btn-primary{flex:2}

    /* ── DRUM PICKER ───────────────────────────── */
    .drum-wrap{position:relative;overflow:hidden}
    .drum-highlight{position:absolute;left:0;right:0;pointer-events:none;z-index:2;
                    border-top:1px solid var(--accent);border-bottom:1px solid var(--accent)}
    .drum-track{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}

    /* ── PICKER MODAL ──────────────────────────── */
    .picker-modal{padding:20px 16px 36px}
    .drum-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;
                color:var(--text-dim);text-align:center;margin-bottom:10px}

    /* ── POST-BREW DRUMS ───────────────────────── */
    .pb-drums{display:flex;gap:0;border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
    .pb-drum-col{flex:1;border-right:1px solid var(--border)}
    .pb-drum-col:last-child{border-right:none}
    .pb-drum-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;
                   color:var(--text-dim);text-align:center;padding:8px 0 6px;
                   border-bottom:1px solid var(--border)}

    /* ── GRIND INPUT ───────────────────────────── */
    .grind-wrap{display:flex;align-items:center;justify-content:center;gap:5px}
    .grind-digit{width:48px;height:60px;background:var(--bg3);border:1px solid var(--border);
                 border-radius:2px;color:var(--text);font-family:'IBM Plex Mono',monospace;
                 font-size:26px;font-weight:500;text-align:center;outline:none;
                 -webkit-appearance:none;transition:border-color .15s;caret-color:var(--accent)}
    .grind-digit:focus{border-color:var(--accent)}
    .grind-dot{font-size:20px;color:var(--text-mid);font-weight:500}
    .grind-hint{font-size:10px;color:var(--text-dim);text-align:center;margin-top:8px}

    /* ── DETAIL EDIT BTN ───────────────────────── */
    .det-edit-btn{background:none;border:1px solid var(--border);color:var(--text-dim);
                  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
                  text-transform:uppercase;padding:6px 12px;cursor:pointer;border-radius:2px;
                  transition:border-color .15s,color .15s;flex-shrink:0;margin-top:2px}
    .det-edit-btn:active{border-color:var(--accent);color:var(--accent)}

    /* ── DIVIDER ───────────────────────────────── */
    .divider{height:1px;background:var(--border);margin:0 14px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════
const STORE = 'dial_v2';

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE));
    return d || { coffees: [], roasters: [], origins: [] };
  } catch(e) { return { coffees: [], roasters: [] }; }
}

function save() {
  localStorage.setItem(STORE, JSON.stringify({
    coffees: S.coffees,
    roasters: S.roasters,
    origins: S.origins
  }));
}

const S = { ...load(), view:'home', tab:'active', selectedId:null, modal:null };
if (!S.roasters) S.roasters = [];
  if (!S.origins) S.origins = [];

// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const TEMP_OPTS  = Array.from({length:20}, (_,i) => ({ value:80+i, label:`${80+i}°` }));
const RATIO_OPTS = [14,14.5,15,15.5,16,16.5,17,17.5,18].map(v => ({
  value: v, label: `1 : ${v % 1 === 0 ? v+'.0' : v}`
}));

// Active drum picker instances
let drums = {};

// ════════════════════════════════════════════
//  DRUM PICKER
// ════════════════════════════════════════════
class Drum {
  constructor(el, opts, initVal) {
    this.el   = el;
    this.opts = opts;
    this.ih   = 46;
    this._val = initVal;
    this._build();
  }

  _build() {
    const pad = 2; // items above/below selected
    const h   = this.ih * (pad*2+1);

    this.el.style.cssText = `height:${h}px;overflow:hidden;position:relative;`;
    this.el.style.webkitMaskImage =
      'linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.4) 22%,black 40%,black 60%,rgba(0,0,0,.4) 78%,transparent 100%)';
    this.el.style.maskImage = this.el.style.webkitMaskImage;

    // Highlight bar
    const bar = document.createElement('div');
    bar.className = 'drum-highlight';
    bar.style.top = `${pad * this.ih}px`;
    bar.style.height = `${this.ih}px`;
    this.el.appendChild(bar);

    // Track
    const track = document.createElement('div');
    track.className = 'drum-track';
    track.style.height = '100%';

    // Top padding
    for (let i=0;i<pad;i++) track.appendChild(this._sp());

    this.opts.forEach((opt, idx) => {
      const item = document.createElement('div');
      item.dataset.idx = idx;
      item.style.cssText =
        `height:${this.ih}px;display:flex;align-items:center;justify-content:center;` +
        `scroll-snap-align:center;font-family:'IBM Plex Mono',monospace;user-select:none;`;
      item.textContent = opt.label;
      track.appendChild(item);
    });

    // Bottom padding
    for (let i=0;i<pad;i++) track.appendChild(this._sp());

    this.track = track;
    this.el.appendChild(track);

    // Set initial scroll after layout
    requestAnimationFrame(() => {
      const idx = this.opts.findIndex(o => String(o.value) === String(this._val));
      if (idx >= 0) this.track.scrollTop = idx * this.ih;
      this._style();
    });

    let t;
    track.addEventListener('scroll', () => {
      this._style();
      clearTimeout(t);
      t = setTimeout(() => {
        const idx = Math.round(this.track.scrollTop / this.ih);
        this.track.scrollTo({ top: idx*this.ih, behavior:'smooth' });
        if (this.opts[idx]) this._val = this.opts[idx].value;
        this._style();
      }, 120);
    }, { passive:true });
  }

  _sp() {
    const s = document.createElement('div');
    s.style.cssText = `height:${this.ih}px;flex-shrink:0;scroll-snap-align:none`;
    return s;
  }

  _style() {
    const sel = Math.round(this.track.scrollTop / this.ih);
    this.track.querySelectorAll('[data-idx]').forEach(item => {
      const d = Math.abs(parseInt(item.dataset.idx) - sel);
      if (d===0) {
        item.style.color = 'var(--text)';
        item.style.fontSize = '20px';
        item.style.fontWeight = '500';
        item.style.opacity = '1';
      } else if (d===1) {
        item.style.color = 'var(--text-mid)';
        item.style.fontSize = '16px';
        item.style.fontWeight = '400';
        item.style.opacity = '.7';
      } else if (d===2) {
        item.style.color = 'var(--text-dim)';
        item.style.fontSize = '13px';
        item.style.fontWeight = '300';
        item.style.opacity = '.35';
      } else {
        item.style.color = 'var(--text-dim)';
        item.style.fontSize = '11px';
        item.style.fontWeight = '300';
        item.style.opacity = '.12';
      }
    });
  }

  getValue() {
    const idx = Math.round(this.track.scrollTop / this.ih);
    return this.opts[idx] ? this.opts[idx].value : this._val;
  }
}

// ════════════════════════════════════════════
//  GRIND INPUT
// ════════════════════════════════════════════
function bindGrindInput(id) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const inputs = Array.from(wrap.querySelectorAll('.grind-digit'));

  inputs.forEach((inp, i) => {
    // On focus, select all
    inp.addEventListener('focus', () => inp.select());

    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        if (inp.value) {
          inp.value = '';
        } else if (i > 0) {
          inputs[i-1].focus();
          inputs[i-1].value = '';
        }
        e.preventDefault();
      }
    });

    inp.addEventListener('input', () => {
      // Allow only single digit
      const v = inp.value.replace(/[^0-9]/g,'').slice(-1);
      inp.value = v;
      if (v && i < inputs.length - 1) {
        inputs[i+1].focus();
        inputs[i+1].select();
      }
    });
  });
}

function getGrindVal(id) {
  const wrap = document.getElementById(id);
  if (!wrap) return '';
  const digits = Array.from(wrap.querySelectorAll('.grind-digit')).map(i => i.value || '_');
  return digits.join('.');
}

function grindInputHTML(id, val) {
  const parts = (val||'').split('.');
  const d = [parts[0]||'', parts[1]||'', parts[2]||''];
  return `
    <div class="grind-wrap" id="${id}">
      <input class="grind-digit" maxlength="1" type="text" inputmode="numeric" value="${d[0]}">
      <span class="grind-dot">.</span>
      <input class="grind-digit" maxlength="1" type="text" inputmode="numeric" value="${d[1]}">
      <span class="grind-dot">.</span>
      <input class="grind-digit" maxlength="1" type="text" inputmode="numeric" value="${d[2]}">
    </div>
    <div class="grind-hint">type three digits — dots fill in automatically</div>
  `;
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function ago(ts) {
  if (!ts) return '—';
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return 'today';
  if (d===1) return 'yesterday';
  if (d<7)   return d+'d ago';
  if (d<60)  return Math.floor(d/7)+'w ago';
  return new Date(ts).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
}

function shortDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-CA',{month:'short',year:'numeric'});
}

function calcWater(dose, ratio) {
  const d = parseFloat(dose), r = parseFloat(ratio);
  if (!d||!r) return null;
  return Math.round(d*r);
}

function getCoffee() { return S.coffees.find(c => c.id===S.selectedId); }
function lastBrew(c) { return c.brews&&c.brews.length ? c.brews[c.brews.length-1] : null; }

function roastColor(r) {
  return {'ultra light':'#d4c4b0',light:'#c4aa88',medium:'#c8832a',dark:'#7a4f1a'}[r]||'var(--text-dim)';
}

function starsHTML(n) {
  let h='<div class="stars">';
  for(let i=1;i<=5;i++) h+=`<span class="${i<=n?'star-on':'star-off'}">★</span>`;
  return h+'</div>';
}

function pipsHTML(n) {
  let h='<div class="pips">';
  for(let i=1;i<=5;i++) h+=`<div class="pip${i<=n?' on':''}"></div>`;
  return h+'</div>';
}

function formatRatio(v) {
  if (!v) return '—';
  const n = parseFloat(v);
  return `1:${n%1===0?n+'.0':n}`;
}

function formatNextTime(nt) {
  if (!nt) return null;
  const parts = [];
  if (nt.ratio) parts.push({ label:'ratio', val: formatRatio(nt.ratio) });
  if (nt.temp)  parts.push({ label:'temp',  val: nt.temp+'°' });
  if (nt.grind) parts.push({ label:'grind', val: nt.grind });
  if (!parts.length) return null;
  return parts;
}

    const lb = lastBrew(c);
    const s  = c.currentSettings||{};
    const water = calcWater(s.dose, s.ratio);

    const chips = [
      s.dose  ? `${s.dose}g`         : null,
      s.ratio ? formatRatio(s.ratio) : null,
      s.grind ? `grind ${s.grind}`   : null,

function bindHome() {
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click',()=>{S.tab=t.dataset.tab;render();}));
  document.querySelectorAll('.card[data-id]').forEach(card =>
    card.addEventListener('click',()=>{
      S.selectedId=card.dataset.id; S.view='detail'; render();
    }));
  document.getElementById('add-fab').addEventListener('click',()=>{
    S.modal='add'; openModal();
  });
}

// ════════════════════════════════════════════
//  BINDING — DETAIL
// ════════════════════════════════════════════
function bindDetail(c) {
  document.getElementById('back-btn').addEventListener('click',()=>{
    S.view='home'; S.selectedId=null; render();
  });
  document.getElementById('edit-btn').addEventListener('click',()=>{
    S.modal='edit'; openModal();
  });

  // Dose auto-save
  const doseInp = document.getElementById('dose-inp');
  if (doseInp) {
    let doseTimer;
    doseInp.addEventListener('input', () => {
      clearTimeout(doseTimer);
      doseTimer = setTimeout(()=>updateSetting(c,'dose',doseInp.value.trim()), 600);
    });
    doseInp.addEventListener('blur', () => updateSetting(c,'dose',doseInp.value.trim()));
  }

  // Tap setting blocks → open picker
  ['ratio','temp','grind'].forEach(key => {
    const el = document.getElementById(`tap-${key}`);
    if (el) el.addEventListener('click',()=>{ S.modal='pick-'+key; openModal(); });
  });
  const timeTap = document.getElementById('tap-time');
  if (timeTap) timeTap.addEventListener('click',()=>{ S.modal='pick-time'; openModal(); });

  const brewBtn = document.getElementById('brew-btn');
  if (brewBtn) brewBtn.addEventListener('click',()=>{ S.modal='post-brew'; openModal(); });

  const finBtn = document.getElementById('finish-btn');
  if (finBtn) finBtn.addEventListener('click',()=>{ S.modal='finish'; openModal(); });

  const reopenBtn = document.getElementById('reopen-btn');
  if (reopenBtn) reopenBtn.addEventListener('click',()=>{
    const idx = S.coffees.findIndex(x=>x.id===c.id);
    S.coffees[idx].status='active'; S.coffees[idx].dateFinished=null;
    save(); render();
  });
}

function updateSetting(c, key, val) {
  const idx = S.coffees.findIndex(x=>x.id===c.id);
  if (idx===-1) return;
  if (!S.coffees[idx].currentSettings) S.coffees[idx].currentSettings={};
  S.coffees[idx].currentSettings[key] = val;
  save();
  // Re-render water calc without full render
  const s = S.coffees[idx].currentSettings;
  const w = calcWater(s.dose, s.ratio);
  const wc = document.querySelector('.water-calc');
  if (wc) wc.innerHTML = w ? `→ <strong>${w}g</strong> water` : '';
}

function removeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

function openModal() {
  removeModal();
  const c = getCoffee();
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = buildModalHTML(c);
  document.body.appendChild(overlay);
  bindModal(c);
}

function buildModalHTML(c) {
  const m = S.modal;
  if (m==='add'||m==='edit')    return modalCoffeeForm(c);
  if (m==='post-brew')          return modalPostBrew(c);
  if (m==='finish')             return modalFinish(c);
  if (m==='pick-ratio')         return modalPickerSingle('Ratio','ratio-drum', RATIO_OPTS, (c&&c.currentSettings&&c.currentSettings.ratio)||16);
  if (m==='pick-temp')          return modalPickerSingle('Temperature','temp-drum', TEMP_OPTS, (c&&c.currentSettings&&c.currentSettings.temp)||93);
  if (m==='pick-grind')         return modalPickGrind(c);
  if (m==='pick-time')          return modalPickTime(c);
  return '';
}

function starInputHTML(id, val) {
  let h = `<div class="star-inp" id="${id}" data-value="${val}">`;

    h += `<button class="star-btn${i<=val?' on':''}" data-v="${i}" type="button">★</button>`;

function pipInputHTML(id, val) {
  let h = `<div class="star-inp" id="${id}" data-value="${val}">`;
  for (let i=1;i<=5;i++)
    h += `<button class="pip-btn" data-v="${i}" type="button">
            <div class="pip${i<=val?' on':''}"></div>
          </button>`;
  return h+'</div>';

function bindRatingInputs() {
  document.querySelectorAll('.star-inp').forEach(container => {
    container.querySelectorAll('[data-v]').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = parseInt(btn.dataset.v);
        container.dataset.value = v;
        // Stars
        container.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('on', i<v));
        // Pips
        container.querySelectorAll('.pip').forEach((p,i) => p.classList.toggle('on', i<v));
      });
    });
  });
}

function getInputVal(id) {
  const el = document.getElementById(id);
  return el ? (parseInt(el.dataset.value)||0) : 0;
}

// ════════════════════════════════════════════
//  BIND MODAL EVENTS
// ════════════════════════════════════════════
function bindModal(c) {
  const overlay = document.getElementById('modal-overlay');
  if (!overlay) return;

  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });

  const cancelBtn = document.getElementById('m-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeModal);

  bindRatingInputs();
  bindGrindInput('pb-grind');
  bindGrindInput('grind-picker');

  // Handle roaster change (globally accessible for onchange)
  window.onRoasterChange = () => {
    const sel = document.getElementById('f-roaster');
    const wrap = document.getElementById('new-roaster-wrap');
    if (!sel||!wrap) return;
    wrap.style.display = sel.value==='__new__' ? 'block' : 'none';
    if (sel.value==='__new__') document.getElementById('new-roaster-inp').focus();
  };
  window.onOriginChange = () => {
    const sel = document.getElementById('f-origin');
    const wrap = document.getElementById('new-origin-wrap');
    if (!sel||!wrap) return;
    wrap.style.display = sel.value==='__new__' ? 'block' : 'none';
    if (sel.value==='__new__') document.getElementById('new-origin-inp').focus();
  };

  // Init drums
  const m = S.modal;

  if (m==='post-brew') {
    const s = c ? (c.currentSettings||{}) : {};
    requestAnimationFrame(()=>{
      const pbR = document.getElementById('pb-ratio-drum');
      const pbT = document.getElementById('pb-temp-drum');
      if (pbR) drums.pbRatio = new Drum(pbR, RATIO_OPTS, s.ratio||16);
      if (pbT) drums.pbTemp  = new Drum(pbT, TEMP_OPTS,  s.temp||93);
    });
  }

  if (m==='pick-ratio') {
    requestAnimationFrame(()=>{
      const el = document.getElementById('ratio-drum');
      if (el) drums.single = new Drum(el, RATIO_OPTS, (c&&c.currentSettings&&c.currentSettings.ratio)||16);
    });
  }

  if (m==='pick-temp') {
    requestAnimationFrame(()=>{
      const el = document.getElementById('temp-drum');
      if (el) drums.single = new Drum(el, TEMP_OPTS, (c&&c.currentSettings&&c.currentSettings.temp)||93);
    });
  }

  // ── SAVE COFFEE FORM ──────────────────────
  const mSave = document.getElementById('m-save');
  if (mSave) {
    mSave.addEventListener('click', () => {
      const roasterSel = document.getElementById('f-roaster').value;
      let roasterName = roasterSel;
      if (roasterSel==='__new__') {
        roasterName = (document.getElementById('new-roaster-inp').value||'').trim();
        if (roasterName && !S.roasters.includes(roasterName)) {
          S.roasters.push(roasterName);
        }
      }

      const data = {
        roaster:          roasterName||'',
        name:             document.getElementById('f-name').value.trim(),
        origin: (() => {
            const originSel = document.getElementById('f-origin');
            if (originSel.value === '__new__') {
              const newOrigin = (document.getElementById('new-origin-inp').value||'').trim();
              if (newOrigin && !S.origins.includes(newOrigin)) S.origins.push(newOrigin);
              return newOrigin;
            }
            return originSel.value;
          })(),
        variety:          document.getElementById('f-variety').value.trim(),
        roastLevel:       document.getElementById('f-roast').value,
        roastDate:        document.getElementById('f-roast-date').value,
        boughtFrom:       document.getElementById('f-bought').value.trim(),
        roasterNotes:     document.getElementById('f-notes').value.trim(),
        comments:         document.getElementById('f-comments').value.trim(),
        rating:           getInputVal('f-rating'),
        tasteMatchRating: getInputVal('f-match'),
      };

      if (S.modal==='add') {
        const nc = { id:uid(), ...data, status:'active', dateAdded:Date.now(), brews:[], currentSettings:{} };
        S.coffees.push(nc);
        save();
        S.modal = null;
        S.selectedId = nc.id;
        S.view = 'detail';
      } else {
        const idx = S.coffees.findIndex(x=>x.id===c.id);
        S.coffees[idx] = { ...S.coffees[idx], ...data };
        save();
        S.modal = null;
      }
      render();
    });
  }

  // ── SAVE POST-BREW ────────────────────────
  const pbSave = document.getElementById('pb-save');
  if (pbSave) {
    pbSave.addEventListener('click', () => {
      const idx = S.coffees.findIndex(x=>x.id===c.id);
      if (idx===-1) return closeModal();
      const nt = {
        ratio: drums.pbRatio ? drums.pbRatio.getValue() : null,
        temp:  drums.pbTemp  ? drums.pbTemp.getValue()  : null,
        grind: getGrindVal('pb-grind').replace(/_/g,''),
      };
      // Clean up empty grind
      if (nt.grind.replace(/\./g,'').trim()==='') nt.grind = null;

      if (!S.coffees[idx].brews) S.coffees[idx].brews=[];
      S.coffees[idx].brews.push({ date:Date.now(), nextTime: nt });
      save();
      S.modal = null;
      render();
    });
  }

  // ── PICKER SAVE ───────────────────────────
  const pSave = document.getElementById('picker-save');
  if (pSave) {
    pSave.addEventListener('click', () => {
      const idx = S.coffees.findIndex(x=>x.id===c.id);
      if (idx===-1) return closeModal();
      if (!S.coffees[idx].currentSettings) S.coffees[idx].currentSettings={};

      if (S.modal==='pick-ratio' && drums.single) {
        S.coffees[idx].currentSettings.ratio = drums.single.getValue();
      }
      if (S.modal==='pick-temp' && drums.single) {
        S.coffees[idx].currentSettings.temp = drums.single.getValue();
      }
      save();
      S.modal = null;
      render();
    });
  }

  // ── GRIND SAVE ────────────────────────────
  const gSave = document.getElementById('grind-save');
  if (gSave) {
    gSave.addEventListener('click', () => {
      const idx = S.coffees.findIndex(x=>x.id===c.id);
      if (idx===-1) return closeModal();
      if (!S.coffees[idx].currentSettings) S.coffees[idx].currentSettings={};
      const val = getGrindVal('grind-picker');
      S.coffees[idx].currentSettings.grind = val.includes('_') ? val : val;
      save();
      S.modal = null;
      render();
    });
  }

  // ── TIME SAVE ─────────────────────────────
  const tSave = document.getElementById('time-save');
  if (tSave) {
    tSave.addEventListener('click', () => {
      const idx = S.coffees.findIndex(x=>x.id===c.id);
      if (idx===-1) return closeModal();
      if (!S.coffees[idx].currentSettings) S.coffees[idx].currentSettings={};
      S.coffees[idx].currentSettings.time = document.getElementById('time-inp').value.trim();
      save();
      S.modal = null;
      render();
    });
  }

  // ── FINISH CONFIRM ────────────────────────
  const finConfirm = document.getElementById('fin-confirm');
  if (finConfirm) {
    finConfirm.addEventListener('click', () => {
      const idx = S.coffees.findIndex(x=>x.id===c.id);
      if (idx===-1) return closeModal();
      S.coffees[idx].status       = 'finished';
      S.coffees[idx].dateFinished = Date.now();
      const r = getInputVal('fin-rating');
      const m = getInputVal('fin-match');
      if (r) S.coffees[idx].rating = r;
      if (m) S.coffees[idx].tasteMatchRating = m;
      const fc = document.getElementById('fin-comments');
      if (fc) S.coffees[idx].comments = fc.value.trim();
      save();
      S.modal = null;
      S.view  = 'home';
      S.tab   = 'history';
      render();
    });
  }
}

function closeModal() {
  S.modal = null;
  removeModal();
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
render();
</script>
</body>
</html>
